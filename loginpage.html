<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="styling.css">
</head>
<body>
    <div class="login_card">
        <div class="microsopt">
            <h2>&#8862;</h2>
            <h2>Microsoft</h2>
        </div>
        <h2>Sign in</h2>
        <div class="emailpassword">
        <input type="email" id="email" placeholder="Email, phone, Skype">

        <input type="password" id="password" placeholder="password">
        </div>

        <div class="remember-row">
            <input type="checkbox" id="ceklis">
            <label for="ceklis">Remember me</label>
        </div>

        <button type="button" class="loginuser">Login</button>
    </div>

    <script src="scripting.js"></script>
</body>
</html>
